<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | HannoGeoBot</title>
  <link rel="icon" href="assets/img/hannog.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <!-- Use the same styles as the main site -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <!-- SortableJS for drag and drop -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
  <div class="background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- Login Section -->
  <div id="login-section" class="login-card-container">
    <div class="login-card">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="ragebai@sybau.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="admin-btn">Login to Dashboard</button>
      </form>
      <p id="login-error" style="color: #ef4444; margin-top: 1rem; display: none;">Invalid credentials.</p>
    </div>
  </div>

  <!-- Dashboard Section (Matches main site structure) -->
  <div id="dashboard" class="container" style="display: none;">
    <header class="header">
      <div class="dashboard-header-ui">
        <h1>Admin Panel</h1>
        <button id="logout-btn" class="more-btn btn-small btn-delete">Logout</button>
      </div>
      <p class="subtitle">Drag and drop cards to reorder. Changes are saved automatically.</p>
      <button id="add-command-btn" class="more-btn" style="margin-top: 2rem; border-color: var(--accent-color); color: var(--accent-color);">+ Add New Command</button>
    </header>

    <h2 class="section-title">Main Commands</h2>
    <main id="main-grid" class="commands-grid admin-grid">
      <!-- Dynamically populated -->
    </main>

    <h2 class="section-title" style="margin-top: 5rem;">Gamble Commands</h2>
    <div id="extra-commands" class="commands-grid admin-grid">
      <!-- Dynamically populated -->
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="command-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title" style="margin-top: 0;">Add New Command</h2>
      <form id="command-form">
        <input type="hidden" id="command-id">
        <div class="form-group">
          <label for="cmd-name">Command Name (e.g. !hello)</label>
          <input type="text" id="cmd-name" required>
        </div>
        <div class="form-group">
          <label for="cmd-aliases">Aliases (optional, comma-separated)</label>
          <input type="text" id="cmd-aliases" placeholder="!hi, !hey">
        </div>
        <div class="form-group">
          <label for="cmd-args">Arguments (optional)</label>
          <input type="text" id="cmd-args">
        </div>
        <div class="form-group">
          <label for="cmd-desc">Description</label>
          <textarea id="cmd-desc" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="cmd-category">Category</label>
          <select id="cmd-category">
            <option value="main">Main Grid</option>
            <option value="gamble">Gamble Section</option>
          </select>
        </div>
        <input type="hidden" id="cmd-order">
        <div style="display: flex; gap: 1rem;">
          <button type="submit" class="admin-btn">Save Command</button>
          <button type="button" id="cancel-btn" class="admin-btn btn-delete">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
