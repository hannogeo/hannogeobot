<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HannoGeoBot Commands</title>
  <link rel="icon" href="hannog.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="container">
    <header class="header">
      <div class="logo-container">
        <h1>HannoGeoBot</h1>
      </div>
      <p class="subtitle">The complete command reference for HannoGeo's Twitch bot.</p>
    </header>

    <div id="loader" style="text-align: center; margin: 4rem 0;">
      <div class="cmd-name" style="animation: pulse 1.5s infinite;">Loading Commands...</div>
    </div>

    <main id="main-grid" class="commands-grid">
      <!-- Dynamically populated -->
    </main>

    <div class="toggle-container">
      <button id="toggle-btn" class="more-btn">Gamble away your points</button>
    </div>

    <div id="extra-commands" class="commands-grid hidden">
      <!-- Dynamically populated -->
    </div>
  </div>

  <style>
    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.5; transform: scale(0.98); }
    }
  </style>

  <script type="module">
    import { auth, db } from './firebase-config.js';
  </script>
  <script src="script.js" type="module"></script>
</body>

</html>
